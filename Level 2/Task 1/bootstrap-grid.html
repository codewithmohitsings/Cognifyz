<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 - Bootstrap Grid</title>
    <!-- This is the CDN link that pulls in the Bootstrap Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- The 'container' class adds margins to the sides so content isn't touching the screen edges -->
    <div class="container py-5">
        <h1 class="text-center mb-5">Bootstrap Responsive Grid</h1>

        <!-- A Grid Row -->
        <div class="row g-4">
            
            <!-- Grid Column 1 -->
            <!-- col-12 = full width on mobile, col-md-4 = takes 1/3 of the screen on desktop -->
            <div class="col-12 col-md-4">
                <div class="p-4 bg-primary text-white rounded shadow-sm text-center">
                    <h3>Column 1</h3>
                    <p>On a phone, I take up the whole screen. On a laptop, I sit next to the others.</p>
                </div>
            </div>

            <!-- Grid Column 2 -->
            <div class="col-12 col-md-4">
                <div class="p-4 bg-success text-white rounded shadow-sm text-center">
                    <h3>Column 2</h3>
                    <p>Resize your browser window to see how we stack on top of each other automatically!</p>
                </div>
            </div>

            <!-- Grid Column 3 -->
            <div class="col-12 col-md-4">
                <div class="p-4 bg-danger text-white rounded shadow-sm text-center">
                    <h3>Column 3</h3>
                    <p>Bootstrap handles all the math and breakpoints for this grid system.</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
