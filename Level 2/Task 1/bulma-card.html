<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 - Bulma Card</title>
    <!-- Bulma CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <!-- Our custom stylesheet to handle the body spacing -->
    <link rel="stylesheet" href="bulma-style.css">
</head>
<body class="has-background-light">

    <div class="container is-max-desktop">
        <h1 class="title has-text-centered mb-6">Bulma Card Component</h1>
        
        <!-- Bulma Card Start -->
        <div class="columns is-centered">
            <div class="column is-half">
                
                <div class="card">
                    <div class="card-image">
                        <figure class="image is-4by3">
                            <img src="placeholder.png" alt="Card placeholder image">
                        </figure>
                    </div>
                    <div class="card-content">
                        <div class="media">
                            <div class="media-content">
                                <p class="title is-4">Frameworks are Awesome</p>
                                <p class="subtitle is-6">@cognifyz_intern</p>
                            </div>
                        </div>
                        <div class="content">
                            This card was built entirely without custom CSS. The Bulma framework handles the shadows, borders, padding, and responsive sizing automatically.
                            <br>
                            <time datetime="2026-06-28">June 28, 2026</time>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <!-- Bulma Card End -->
        
    </div>

</body>
</html>
